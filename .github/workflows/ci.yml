name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            TeachSpark.Web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: |
          cd TeachSpark.Web
          npm ci

      - name: Run ESLint
        run: |
          cd TeachSpark.Web
          npm run lint

      - name: Run Stylelint
        run: |
          cd TeachSpark.Web
          npm run lint:css

      - name: Check Prettier formatting
        run: |
          cd TeachSpark.Web
          npm run format:check

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            TeachSpark.Web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: |
          cd TeachSpark.Web
          npm ci

      - name: Build frontend assets
        run: |
          cd TeachSpark.Web
          npm run build

      - name: Restore .NET dependencies
        run: dotnet restore TeachSpark.sln

      - name: Build .NET application
        run: dotnet build TeachSpark.sln --no-restore --configuration Release

      - name: Run .NET tests
        run: dotnet test TeachSpark.sln --no-build --configuration Release --verbosity normal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            TeachSpark.Web/wwwroot/
            TeachSpark.Web/bin/Release/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            TeachSpark.Web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd TeachSpark.Web
          npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level moderate
          cd TeachSpark.Web
          npm audit --audit-level moderate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build for CodeQL
        run: |
          cd TeachSpark.Web
          npm run build
          cd ..
          dotnet build TeachSpark.sln --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
